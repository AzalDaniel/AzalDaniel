name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [ main ]
    paths: [ ".github/workflows/snake.yml" ]

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Generate the snake (brand-themed, private-inclusive)
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          github_token: ${{ secrets.METRICS_TOKEN }}
          outputs: |
            dist/github-snake.svg?color_snake=#00283e&color_dots=#e9f3f3,#a0dcdb,#669ba2,#2a5868,#00283e
            dist/github-snake-dark.svg?color_snake=#a0dcdb&color_dots=#16212a,#1d3b49,#2a5868,#669ba2,#a0dcdb
            dist/github-snake.gif?color_snake=#a0dcdb&color_dots=#16212a,#1d3b49,#2a5868,#669ba2,#a0dcdb

      - name: Publish to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
