name: GitHub Profile 3D Contrib

on:
  schedule:
    - cron: "30 0 * * *"   # daily, just after the snake
  workflow_dispatch:
  push:
    branches: [ main ]
    paths: [ ".github/workflows/3d-contrib.yml" ]   # self-trigger only; the daily art commit won't loop

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-3d-contrib
    steps:
      - uses: actions/checkout@v4
      - uses: yoshi389111/github-profile-3d-contrib@0.9.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
      - name: Commit & push generated art
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-3d-contrib
          git commit -m "chore: regenerate 3D contribution art" || echo "no changes"
          git push
